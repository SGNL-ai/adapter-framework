syntax = "proto3";

package sgnl.grpc_proxy.v1;

option go_package = "github.com/sgnl-ai/adapter-framework/pkg/grpc_proxy/v1";

// LDAPSearchRequest is a wrapper around a marshalled LDAP Adapter request to an 
// on-premises connector.
message LDAPSearchRequest {
  string request = 1;
}

// LDAPSearchResponse is a wrapper around a marshalled LDAP processed response or
// any error (marshalled framework.Error) while processing the request from an on-premises connector.
message LDAPSearchResponse {
  string response = 1;
  string error = 2;
}

// LDAPAttribute represents an LDAP attribute with a type name and values.
// Maps to both ldap.Attribute (used in add) and ldap.PartialAttribute (used in modify).
// Values use bytes (not string) because LDAP attribute values can be arbitrary
// binary data (e.g., objectGUID, certificates) that may not be valid UTF-8.
message LDAPAttribute {
  string type = 1;
  repeated bytes values = 2;
}

// LDAPModifyOperation represents the type of modification to apply to an attribute.
// Values align with go-ldap/ldap/v3 constants: AddAttribute=0, DeleteAttribute=1, ReplaceAttribute=2.
enum LDAPModifyOperation {
  LDAP_MODIFY_OPERATION_ADD = 0;
  LDAP_MODIFY_OPERATION_DELETE = 1;
  LDAP_MODIFY_OPERATION_REPLACE = 2;
}

// LDAPAddRequest represents a request to add a new LDAP entry.
// Maps to ldap.AddRequest.
message LDAPAddRequest {
  string dn = 1;
  repeated LDAPAttribute attributes = 2;
}

// LDAPModifyChange represents a single modification within a modify operation.
// Maps to ldap.Change.
message LDAPModifyChange {
  LDAPModifyOperation operation = 1;
  LDAPAttribute modification = 2;
}

// LDAPModifyRequest represents a request to modify attributes of an existing LDAP entry.
// Maps to ldap.ModifyRequest.
message LDAPModifyRequest {
  string dn = 1;
  repeated LDAPModifyChange changes = 2;
}

// LDAPDeleteRequest represents a request to delete an LDAP entry.
// Maps to ldap.DelRequest.
message LDAPDeleteRequest {
  string dn = 1;
}

// LDAPModifyDNRequest represents a request to rename or move an LDAP entry.
// Maps to ldap.ModifyDNRequest.
message LDAPModifyDNRequest {
  string dn = 1;
  string new_rdn = 2;
  bool delete_old_rdn = 3;
  string new_superior = 4;
}

// LDAPSearchScope represents the scope of an LDAP search operation.
// Values align with go-ldap/ldap/v3 constants: ScopeBaseObject=0, ScopeSingleLevel=1, ScopeWholeSubtree=2.
enum LDAPSearchScope {
  LDAP_SEARCH_SCOPE_BASE = 0;
  LDAP_SEARCH_SCOPE_ONE_LEVEL = 1;
  LDAP_SEARCH_SCOPE_SUBTREE = 2;
}

// LDAPSearchOpRequest represents a structured LDAP search operation request.
// Maps to ldap.SearchRequest for credentialed bind-per-operation LDAP searches.
message LDAPSearchOpRequest {
  string base_dn = 1;
  // Optional scope field to avoid dangerous proto3 default behavior.
  // If not set, server should apply SUBTREE scope as the safe default.
  // If explicitly set to BASE, the restrictive base-object-only search is intended.
  optional LDAPSearchScope scope = 2;
  string filter = 3;
  repeated string attributes = 4;
  int32 size_limit = 5;
  int32 time_limit = 6; // in seconds
}

// LDAPOperationRequest wraps credentialed LDAP operations (including search and
// write-like operations) with connection credentials.
// Each request is self-contained (bind-per-operation pattern); the on-prem
// connector's SessionPool handles actual connection reuse.
message LDAPOperationRequest {
  string url = 1;
  string bind_dn = 2;
  string bind_password = 3;
  oneof operation {
    LDAPAddRequest add_request = 4;
    LDAPModifyRequest modify_request = 5;
    LDAPDeleteRequest delete_request = 6;
    LDAPModifyDNRequest modify_dn_request = 7;
    LDAPSearchOpRequest search_request = 8;
  }
}

// LDAPOperationResponse represents the result of an LDAP write operation.
// Fields map to RFC 4511 LDAPResult and go-ldap's Error type.
// Success is derived from result_code == 0 (no explicit success field).
message LDAPOperationResponse {
  reserved 1;
  reserved "success";
  string error = 2;
  int32 result_code = 3;
  string matched_dn = 4;
}
